name: Actualizar Brent EIA

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests xlrd

      - name: Ejecutar script
        run: python eia_brent_daily.py

      - name: Verificar archivo generado
        run: ls -la

      - name: Guardar cambios en GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eia_brent.csv
          git commit -m "update eia brent csv" || echo "sin cambios"
          git push
